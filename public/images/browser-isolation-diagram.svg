<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 520" role="img" aria-labelledby="title desc">
  <title id="title">Browser process isolation</title>
  <desc id="desc">Browser process, renderer processes, and constrained communication paths.</desc>
  <rect width="1100" height="520" rx="24" fill="#f8fafc"/>
  <rect x="56" y="52" width="988" height="416" rx="22" fill="#eff6ff" stroke="#2563eb"/>
  <rect x="110" y="95" width="880" height="72" rx="16" fill="#1e3a8a"/>
  <text x="408" y="141" fill="#fff" font-family="Arial, sans-serif" font-size="26" font-weight="700">Browser Process</text>
  <g font-family="Arial, sans-serif" font-size="22" font-weight="700">
    <rect x="120" y="260" width="210" height="110" rx="18" fill="#0f766e"/>
    <text x="168" y="322" fill="#fff">Site A renderer</text>
    <rect x="445" y="260" width="210" height="110" rx="18" fill="#7c3aed"/>
    <text x="493" y="322" fill="#fff">Site B renderer</text>
    <rect x="770" y="260" width="210" height="110" rx="18" fill="#b45309"/>
    <text x="818" y="322" fill="#fff">Utility process</text>
  </g>
  <g stroke="#0f172a" stroke-width="4" stroke-dasharray="10 10" fill="none">
    <path d="M225 168v92"/>
    <path d="M550 168v92"/>
    <path d="M875 168v92"/>
  </g>
  <text x="156" y="420" fill="#334155" font-family="Arial, sans-serif" font-size="20">隔离不是绝对安全，但能缩小单点突破后的影响面。</text>
</svg>
