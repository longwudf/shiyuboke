<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 520" role="img" aria-labelledby="title desc">
  <title id="title">Security triage flow</title>
  <desc id="desc">A triage flow from advisory intake to asset exposure, patch window, and verification.</desc>
  <rect width="1100" height="520" rx="24" fill="#f8fafc"/>
  <rect x="40" y="40" width="1020" height="440" rx="20" fill="#ecfeff" stroke="#0f766e"/>
  <g font-family="Arial, sans-serif" font-size="24" font-weight="700">
    <rect x="90" y="180" width="190" height="100" rx="18" fill="#0f766e"/>
    <text x="126" y="240" fill="#fff">公告输入</text>
    <rect x="330" y="180" width="190" height="100" rx="18" fill="#155e75"/>
    <text x="366" y="240" fill="#fff">资产映射</text>
    <rect x="570" y="180" width="190" height="100" rx="18" fill="#be123c"/>
    <text x="606" y="240" fill="#fff">补丁窗口</text>
    <rect x="810" y="180" width="190" height="100" rx="18" fill="#854d0e"/>
    <text x="846" y="240" fill="#fff">验证复盘</text>
  </g>
  <g stroke="#0f172a" stroke-width="5" stroke-linecap="round" fill="none">
    <path d="M280 230h45"/>
    <path d="M520 230h45"/>
    <path d="M760 230h45"/>
  </g>
  <g fill="#0f172a" font-family="Arial, sans-serif" font-size="20">
    <text x="96" y="330">KEV / vendor / GHSA</text>
    <text x="336" y="330">版本、入口、暴露面</text>
    <text x="576" y="330">修复、回滚、停机窗口</text>
    <text x="816" y="330">扫描、日志、经验库</text>
  </g>
</svg>
