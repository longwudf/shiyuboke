<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Browser isolation and rendering pipeline</title>
  <desc id="desc">Layered browser architecture showing process isolation and rendering stages.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#052e16"/>
      <stop offset="0.55" stop-color="#0f766e"/>
      <stop offset="1" stop-color="#312e81"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <rect x="92" y="86" width="1016" height="503" rx="32" fill="#f8fafc" fill-opacity="0.12" stroke="#bfdbfe" stroke-opacity="0.55"/>
  <text x="130" y="165" fill="#f8fafc" font-family="Arial, sans-serif" font-size="54" font-weight="800">Browser Pipeline</text>
  <text x="132" y="214" fill="#d1fae5" font-family="Arial, sans-serif" font-size="24">Site Isolation · Rendering · Security Boundary</text>
  <g transform="translate(130 300)" font-family="Arial, sans-serif">
    <rect width="190" height="130" rx="18" fill="#082f49" stroke="#7dd3fc"/>
    <text x="34" y="58" fill="#f0f9ff" font-size="27" font-weight="700">Network</text>
    <text x="34" y="94" fill="#bae6fd" font-size="18">fetch & cache</text>
    <rect x="250" width="190" height="130" rx="18" fill="#064e3b" stroke="#86efac"/>
    <text x="284" y="58" fill="#f0fdf4" font-size="27" font-weight="700">Parse</text>
    <text x="284" y="94" fill="#bbf7d0" font-size="18">DOM & CSSOM</text>
    <rect x="500" width="190" height="130" rx="18" fill="#4c1d95" stroke="#c4b5fd"/>
    <text x="534" y="58" fill="#faf5ff" font-size="27" font-weight="700">Layout</text>
    <text x="534" y="94" fill="#ddd6fe" font-size="18">geometry</text>
    <rect x="750" width="190" height="130" rx="18" fill="#7c2d12" stroke="#fdba74"/>
    <text x="784" y="58" fill="#fff7ed" font-size="27" font-weight="700">Paint</text>
    <text x="784" y="94" fill="#fed7aa" font-size="18">composite</text>
  </g>
  <path d="M331 365h44m198 0h44m198 0h44" stroke="#e0f2fe" stroke-width="6" stroke-linecap="round"/>
</svg>
