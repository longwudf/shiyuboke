    <text x="26" y="98" fill="#fecaca" font-family="Arial, sans-serif" font-size="22">Known exploited</text>
    <text x="26" y="134" fill="#99f6e4" font-family="Arial, sans-serif" font-size="22">Due-date driven</text>
  </g>
  <g transform="translate(460 270)">
    <rect width="260" height="170" rx="18" fill="#0f172a" stroke="#fb7185"/>
