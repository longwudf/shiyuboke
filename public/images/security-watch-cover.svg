    <text x="26" y="98" fill="#fecaca" font-family="Arial, sans-serif" font-size="22">Version target</text>
    <text x="26" y="134" fill="#99f6e4" font-family="Arial, sans-serif" font-size="22">Rollback plan</text>
  </g>
  <path d="M238 510h724" stroke="#ccfbf1" stroke-width="8" stroke-linecap="round" stroke-dasharray="20 24"/>
  <circle cx="238" cy="510" r="20" fill="#5eead4"/>
  <circle cx="600" cy="510" r="20" fill="#fb7185"/>
